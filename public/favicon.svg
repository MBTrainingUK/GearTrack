<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <pattern id="stripes" width="76" height="76" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)">
      <rect width="76" height="76" fill="#ffffff"/>
      <rect width="38" height="76" fill="#2563eb"/>
    </pattern>
    <clipPath id="stickClip">
      <rect x="92" y="140" width="328" height="62" rx="14"/>
    </clipPath>
    <clipPath id="topStripClip">
      <rect x="92" y="218" width="328" height="50"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="104" fill="#2563eb"/>

  <!-- moving clapper stick, open at an angle, hinged at left -->
  <g transform="rotate(-14 102 214)">
    <rect x="92" y="140" width="328" height="62" rx="14" fill="#ffffff"/>
    <g clip-path="url(#stickClip)">
      <rect x="40" y="100" width="440" height="150" fill="url(#stripes)"/>
    </g>
    <rect x="92" y="140" width="328" height="62" rx="14" fill="none" stroke="#ffffff" stroke-width="10"/>
  </g>

  <!-- board body -->
  <rect x="92" y="218" width="328" height="186" rx="18" fill="#ffffff"/>
  <g clip-path="url(#topStripClip)">
    <rect x="40" y="175" width="440" height="140" fill="url(#stripes)"/>
  </g>
  <rect x="92" y="218" width="328" height="186" rx="18" fill="none" stroke="#ffffff" stroke-width="10"/>

  <!-- text lines on the board -->
  <rect x="128" y="304" width="180" height="18" rx="9" fill="#bfdbfe"/>
  <rect x="128" y="348" width="124" height="18" rx="9" fill="#bfdbfe"/>
</svg>
